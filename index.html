<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SoundScript — 听见每一个字</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Instrument+Serif:ital@0;1&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}

:root{
  --bg:#080810;
  --bg2:#0e0e1a;
  --card:#141420;
  --card2:#1a1a2a;
  --border:#252538;
  --border2:#2e2e44;
  --accent:#e8b4b8;
  --accent2:#dba0a5;
  --accent-glow:#f0c8cc;
  --accent-dim:rgba(232,180,184,0.1);
  --teal:#7ec8c8;
  --teal-dim:rgba(126,200,200,0.1);
  --gold:#e8d4a0;
  --text:#d8d4e0;
  --text2:#9590a8;
  --text3:#5c586e;
  --sub-active:#fffbe6;
  --sub-past:#585468;
}

html{font-size:16px}

body{
  background:var(--bg);
  color:var(--text);
  font-family:'Noto Sans SC','Helvetica Neue',sans-serif;
  min-height:100vh;
  overflow-x:hidden;
}

/* === GRAIN OVERLAY === */
body::after{
  content:'';position:fixed;inset:0;z-index:9999;pointer-events:none;
  opacity:0.03;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
}

/* === AMBIENT GLOW === */
.ambient{
  position:fixed;inset:0;z-index:0;pointer-events:none;
  background:
    radial-gradient(ellipse 600px 400px at 15% 15%, rgba(232,180,184,0.06) 0%, transparent 100%),
    radial-gradient(ellipse 500px 500px at 85% 75%, rgba(126,200,200,0.04) 0%, transparent 100%),
    radial-gradient(ellipse 800px 300px at 50% 100%, rgba(232,212,160,0.03) 0%, transparent 100%);
}

/* === HEADER === */
header{
  position:sticky;top:0;z-index:100;
  padding:20px 32px;
  display:flex;align-items:center;justify-content:space-between;
  border-bottom:1px solid var(--border);
  background:rgba(8,8,16,0.85);
  backdrop-filter:blur(24px);
}

.logo{display:flex;align-items:baseline;gap:10px}

.logo-mark{
  font-family:'Instrument Serif',serif;
  font-size:28px;font-style:italic;
  color:var(--accent);
  letter-spacing:-1px;
}

.logo-sub{
  font-family:'DM Mono',monospace;font-size:11px;
  color:var(--text3);letter-spacing:2px;text-transform:uppercase;
}

.gh-link{
  font-family:'DM Mono',monospace;font-size:12px;
  color:var(--text3);text-decoration:none;
  padding:6px 14px;border:1px solid var(--border);border-radius:6px;
  transition:all 0.3s;
}
.gh-link:hover{color:var(--accent);border-color:var(--accent-dim)}

/* === MAIN === */
main{
  position:relative;z-index:5;
  max-width:1320px;margin:0 auto;
  padding:28px 32px;
}

@media(max-width:768px){
  main{padding:20px 14px}
  header{padding:14px 16px}
}

/* === INPUT SECTION === */
.input-section{margin-bottom:28px}

.input-row{
  display:flex;gap:0;
  border:1px solid var(--border);border-radius:12px;
  background:var(--card);overflow:hidden;
  transition:border-color 0.4s,box-shadow 0.4s;
}
.input-row:focus-within{
  border-color:rgba(232,180,184,0.4);
  box-shadow:0 0 40px rgba(232,180,184,0.06);
}

.input-tag{
  display:flex;align-items:center;
  padding:0 18px;
  font-family:'DM Mono',monospace;font-size:12px;
  color:var(--accent2);letter-spacing:1px;
  background:rgba(232,180,184,0.05);
  border-right:1px solid var(--border);
  white-space:nowrap;
}

#urlInput{
  flex:1;padding:18px 20px;
  background:transparent;border:none;outline:none;
  color:var(--text);font-family:'DM Mono',monospace;font-size:13px;
}
#urlInput::placeholder{color:var(--text3)}

.parse-btn{
  padding:18px 32px;border:none;
  background:linear-gradient(135deg,var(--accent2),var(--accent));
  color:var(--bg);font-family:'Noto Sans SC',sans-serif;
  font-size:14px;font-weight:700;cursor:pointer;
  transition:all 0.3s;letter-spacing:1px;
}
.parse-btn:hover{filter:brightness(1.1);padding-right:36px}
.parse-btn:active{transform:scale(0.97)}
.parse-btn:disabled{opacity:0.5;cursor:not-allowed}

/* Secondary actions */
.secondary-row{
  display:flex;gap:12px;margin-top:14px;align-items:center;
}

.upload-btn{
  display:flex;align-items:center;gap:8px;
  padding:10px 18px;
  background:var(--card);border:1px dashed var(--border);
  border-radius:10px;color:var(--text2);font-size:13px;
  cursor:pointer;transition:all 0.3s;
}
.upload-btn:hover{border-color:var(--teal);color:var(--teal);background:var(--teal-dim)}
.upload-btn.loaded{border-color:var(--teal);border-style:solid;color:var(--teal);background:var(--teal-dim)}

.upload-btn input{display:none}

.help-text{
  margin-left:auto;
  font-family:'DM Mono',monospace;font-size:11px;color:var(--text3);
}

/* === WORKSPACE === */
.workspace{
  display:grid;
  grid-template-columns:1fr 400px;
  gap:20px;
  min-height:520px;
}

@media(max-width:900px){
  .workspace{grid-template-columns:1fr;gap:16px}
}

/* === PLAYER CARD === */
.player-card{
  background:var(--card);border:1px solid var(--border);border-radius:14px;
  padding:0;display:flex;flex-direction:column;overflow:hidden;
  position:relative;
}

.player-top-line{
  height:2px;
  background:linear-gradient(90deg,transparent,var(--accent),var(--teal),transparent);
}

.player-inner{padding:28px 28px 24px}

.player-label{
  font-family:'DM Mono',monospace;font-size:10px;
  color:var(--text3);text-transform:uppercase;letter-spacing:3px;
  margin-bottom:14px;
}

.player-title{
  font-family:'Instrument Serif',serif;
  font-size:28px;font-style:italic;
  color:var(--text);line-height:1.3;
  margin-bottom:6px;
}

.player-meta{
  font-family:'DM Mono',monospace;font-size:11px;
  color:var(--text3);margin-bottom:28px;
}

/* YouTube embed area */
.yt-container{
  position:relative;
  width:100%;padding-top:56.25%; /* 16:9 */
  background:var(--bg2);border-radius:10px;overflow:hidden;
  margin-bottom:24px;
  border:1px solid var(--border);
}

.yt-container iframe,
.yt-container .yt-placeholder{
  position:absolute;inset:0;width:100%;height:100%;
}

.yt-placeholder{
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:12px;
  color:var(--text3);
}

.yt-placeholder .ph-icon{
  font-size:40px;opacity:0.4;
}

.yt-placeholder .ph-text{
  font-family:'DM Mono',monospace;font-size:12px;
}

/* Audio-only mode toggle */
.mode-toggle{
  display:flex;gap:0;margin-bottom:20px;
  border:1px solid var(--border);border-radius:8px;overflow:hidden;
}

.mode-btn{
  flex:1;padding:8px 0;border:none;
  background:transparent;color:var(--text3);
  font-family:'DM Mono',monospace;font-size:11px;
  cursor:pointer;transition:all 0.3s;
  letter-spacing:0.5px;
}

.mode-btn.active{
  background:var(--accent-dim);color:var(--accent);
}

.mode-btn:hover:not(.active){color:var(--text2)}

/* Progress */
.progress-wrap{margin-bottom:16px}

.progress-track{
  width:100%;height:5px;background:var(--bg2);
  border-radius:3px;cursor:pointer;position:relative;
  transition:height 0.2s;
}
.progress-track:hover{height:8px}

.progress-fill{
  height:100%;border-radius:3px;
  background:linear-gradient(90deg,var(--accent),var(--teal));
  width:0%;transition:width 0.1s linear;
  position:relative;
}

.progress-fill::after{
  content:'';position:absolute;right:-5px;top:50%;
  transform:translateY(-50%);
  width:12px;height:12px;
  background:var(--accent-glow);border-radius:50%;
  box-shadow:0 0 10px rgba(232,180,184,0.5);
  opacity:0;transition:opacity 0.2s;
}
.progress-track:hover .progress-fill::after{opacity:1}

.time-stamps{
  display:flex;justify-content:space-between;margin-top:6px;
  font-family:'DM Mono',monospace;font-size:11px;color:var(--text3);
}

/* Controls */
.controls{
  display:flex;align-items:center;justify-content:center;gap:16px;
  margin-bottom:20px;
}

.c-btn{
  width:40px;height:40px;border-radius:50%;
  background:transparent;border:1px solid var(--border);
  color:var(--text2);font-size:14px;
  cursor:pointer;transition:all 0.25s;
  display:flex;align-items:center;justify-content:center;
}
.c-btn:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-dim)}

.c-btn.play{
  width:56px;height:56px;font-size:20px;
  background:linear-gradient(135deg,var(--accent2),var(--accent));
  border:none;color:var(--bg);
  box-shadow:0 4px 24px rgba(232,180,184,0.25);
}
.c-btn.play:hover{
  transform:scale(1.08);
  box-shadow:0 6px 32px rgba(232,180,184,0.4);
}

/* Bottom bar */
.player-bottom{
  display:flex;align-items:center;gap:12px;
  padding:14px 28px;
  background:var(--bg2);border-top:1px solid var(--border);
}

.vol-icon{cursor:pointer;font-size:16px;color:var(--text3);transition:color 0.2s}
.vol-icon:hover{color:var(--text)}

.vol-slider{
  width:90px;-webkit-appearance:none;height:3px;
  background:var(--border);border-radius:2px;outline:none;
}
.vol-slider::-webkit-slider-thumb{
  -webkit-appearance:none;width:12px;height:12px;
  background:var(--accent);border-radius:50%;cursor:pointer;
}

.speed-tag{
  margin-left:auto;
  padding:4px 10px;
  background:var(--card2);border:1px solid var(--border);border-radius:5px;
  font-family:'DM Mono',monospace;font-size:11px;color:var(--text3);
  cursor:pointer;transition:all 0.2s;
}
.speed-tag:hover{border-color:var(--accent);color:var(--accent)}

/* === SUBTITLE PANEL === */
.sub-panel{
  background:var(--card);border:1px solid var(--border);border-radius:14px;
  display:flex;flex-direction:column;overflow:hidden;
}

.sub-head{
  padding:18px 22px;border-bottom:1px solid var(--border);
  display:flex;justify-content:space-between;align-items:center;
}

.sub-head-title{
  font-family:'Instrument Serif',serif;font-size:18px;font-style:italic;
  color:var(--text);
}

.sub-count{
  font-family:'DM Mono',monospace;font-size:11px;
  padding:3px 10px;border-radius:20px;
  background:var(--accent-dim);color:var(--accent2);
}

.sub-scroll{
  flex:1;overflow-y:auto;padding:10px 0;
  scroll-behavior:smooth;
  max-height:460px;
}

.sub-scroll::-webkit-scrollbar{width:3px}
.sub-scroll::-webkit-scrollbar-track{background:transparent}
.sub-scroll::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}

.s-line{
  padding:11px 22px;display:flex;gap:14px;
  cursor:pointer;transition:all 0.3s;
  border-left:2px solid transparent;
}
.s-line:hover{background:rgba(255,255,255,0.02)}

.s-line.active{
  background:var(--accent-dim);
  border-left-color:var(--accent);
}
.s-line.active .s-text{color:var(--sub-active);font-weight:500}
.s-line.active .s-time{color:var(--accent)}
.s-line.past .s-text{color:var(--sub-past)}

.s-time{
  font-family:'DM Mono',monospace;font-size:11px;
  color:var(--text3);min-width:48px;padding-top:3px;flex-shrink:0;
}

.s-text{
  font-size:14px;line-height:1.65;color:var(--text2);
  transition:color 0.3s;
}

/* Empty state */
.empty{
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  padding:60px 30px;text-align:center;
  height:100%;
}
.empty-icon{font-size:36px;margin-bottom:14px;opacity:0.3}
.empty-t{font-family:'Instrument Serif',serif;font-size:18px;font-style:italic;margin-bottom:8px;color:var(--text2)}
.empty-d{font-size:12px;color:var(--text3);line-height:1.7;max-width:240px}

/* === STATUS === */
.status{
  margin-top:16px;padding:10px 18px;
  background:var(--card);border:1px solid var(--border);border-radius:8px;
  display:flex;align-items:center;gap:10px;
}

.st-dot{width:6px;height:6px;border-radius:50%;background:var(--text3)}
.st-dot.ok{background:var(--teal);box-shadow:0 0 8px rgba(126,200,200,0.4)}
.st-dot.wait{background:var(--gold);animation:blink 1.2s infinite}
.st-dot.err{background:#e87474}

@keyframes blink{0%,100%{opacity:1}50%{opacity:0.3}}

.st-text{font-family:'DM Mono',monospace;font-size:11px;color:var(--text3)}

/* === ANIMATIONS === */
@keyframes fadeUp{
  from{opacity:0;transform:translateY(16px)}
  to{opacity:1;transform:translateY(0)}
}

.input-section{animation:fadeUp 0.6s ease-out}
.workspace{animation:fadeUp 0.6s ease-out 0.15s both}
.status{animation:fadeUp 0.6s ease-out 0.3s both}
</style>
</head>
<body>

<div class="ambient"></div>

<header>
  <div class="logo">
    <span class="logo-mark">SoundScript</span>
    <span class="logo-sub">listen · read · learn</span>
  </div>
  <a class="gh-link" href="https://github.com/JulienSorel2000/soundscript" target="_blank">GitHub ↗</a>
</header>

<main>
  <div class="input-section">
    <div class="input-row">
      <div class="input-tag">YOUTUBE</div>
      <input id="urlInput" type="text" placeholder="粘贴 YouTube 视频链接，按回车或点击解析...">
      <button class="parse-btn" id="parseBtn" onclick="handleParse()">解 析</button>
    </div>
    <div class="secondary-row">
      <label class="upload-btn" id="srtUploadBtn">
        <span>📄</span><span>上传 SRT 字幕</span>
        <input type="file" accept=".srt,.vtt,.txt" onchange="handleSrtUpload(this)">
      </label>
      <span class="help-text" id="helpText">支持任何 YouTube 视频链接</span>
    </div>
  </div>

  <div class="workspace">
    <!-- Player -->
    <div class="player-card">
      <div class="player-top-line"></div>
      <div class="player-inner">
        <div class="player-label">now playing</div>
        <div class="player-title" id="pTitle">等待加载...</div>
        <div class="player-meta" id="pMeta">输入YouTube链接开始</div>

        <!-- Mode toggle -->
        <div class="mode-toggle">
          <button class="mode-btn active" data-mode="video" onclick="setMode('video')">📺 视频模式</button>
          <button class="mode-btn" data-mode="audio" onclick="setMode('audio')">🎧 纯听模式</button>
        </div>

        <!-- YouTube embed -->
        <div class="yt-container" id="ytContainer">
          <div class="yt-placeholder" id="ytPlaceholder">
            <div class="ph-icon">◉</div>
            <div class="ph-text">等待视频加载</div>
          </div>
          <div id="ytPlayer"></div>
        </div>

        <!-- Progress (used in audio mode or as overlay) -->
        <div class="progress-wrap">
          <div class="progress-track" id="progressTrack" onclick="seekTo(event)">
            <div class="progress-fill" id="progressFill"></div>
          </div>
          <div class="time-stamps">
            <span id="curTime">0:00</span>
            <span id="totTime">0:00</span>
          </div>
        </div>

        <!-- Controls -->
        <div class="controls">
          <button class="c-btn" onclick="skip(-10)" title="-10s">⏪</button>
          <button class="c-btn play" id="playBtn" onclick="togglePlay()">▶</button>
          <button class="c-btn" onclick="skip(10)" title="+10s">⏩</button>
        </div>
      </div>

      <div class="player-bottom">
        <span class="vol-icon" onclick="toggleMute()">🔊</span>
        <input type="range" class="vol-slider" id="volSlider" min="0" max="100" value="80" oninput="setVol(this.value)">
        <span class="speed-tag" id="speedTag" onclick="cycleSpeed()">1.0×</span>
      </div>
    </div>

    <!-- Subtitles -->
    <div class="sub-panel">
      <div class="sub-head">
        <span class="sub-head-title">Transcript</span>
        <span class="sub-count" id="subCount">—</span>
      </div>
      <div class="sub-scroll" id="subScroll">
        <div class="empty" id="emptyState">
          <div class="empty-icon">💬</div>
          <div class="empty-t">暂无字幕</div>
          <div class="empty-d">解析视频后字幕将在此同步滚动，你也可以上传 SRT 文件</div>
        </div>
      </div>
    </div>
  </div>

  <div class="status">
    <div class="st-dot" id="stDot"></div>
    <span class="st-text" id="stText">就绪</span>
  </div>
</main>

<!-- YouTube IFrame API -->
<script>
// ================================================================
// 底层原理注释（给CS初学者看的）
// ================================================================
//
// 【YouTube IFrame API 的工作原理】
// 我们在HTML里加载YouTube官方的脚本(iframe_api)，
// 这个脚本会在全局作用域注入一个 YT.Player 构造函数。
// 当我们 new YT.Player(...) 时，它做了以下事情：
//   1. 创建一个 <iframe> 元素，src指向YouTube的嵌入页面
//   2. 通过 window.postMessage API 在我们的页面和iframe之间通信
//   3. postMessage 是浏览器提供的跨域通信机制（因为我们的页面
//      和YouTube的iframe是不同的"源"，正常情况下不能互相访问）
//   4. YouTube的iframe收到我们的指令（播放/暂停/跳转），执行后
//      把状态变化通过 postMessage 发回来
//
// 【字幕获取的原理】
// YouTube的字幕数据可以通过公开的URL获取，格式类似：
// https://www.youtube.com/api/timedtext?v=VIDEO_ID&lang=en
// 但由于CORS限制，浏览器不能直接请求YouTube的API。
// 所以我们使用一个免费的代理服务来中转请求，
// 或者让用户手动上传SRT字幕文件。
//
// 【事件循环 & requestAnimationFrame】
// 浏览器有一个"事件循环"(Event Loop)不断运行：
//   1. 检查有没有待执行的任务（点击事件、网络响应等）
//   2. 执行任务
//   3. 渲染画面
//   4. 回到第1步
// requestAnimationFrame 会在每一帧渲染前调用我们的函数，
// 大约每秒60次。我们利用它来：
//   - 获取YouTube播放器的当前时间
//   - 用二分查找定位对应的字幕
//   - 更新进度条
// ================================================================

let player = null;        // YouTube Player 实例
let subs = [];            // 字幕数组：[{start, end, text}, ...]
let playing = false;
let curSubIdx = -1;
let raf = null;           // requestAnimationFrame 的 ID
let mode = 'video';       // 'video' | 'audio'
let speeds = [0.5, 0.75, 1.0, 1.25, 1.5, 2.0];
let spdIdx = 2;
let playerReady = false;
let pendingVideoId = null;

// ================================================================
// 1. 加载 YouTube IFrame API
// ================================================================
// 动态创建 <script> 标签加载YouTube的JS文件
// 这比直接写在HTML里更灵活——你可以控制加载时机
const tag = document.createElement('script');
tag.src = 'https://www.youtube.com/iframe_api';
const firstScript = document.getElementsByTagName('script')[0];
firstScript.parentNode.insertBefore(tag, firstScript);

// YouTube API 加载完成后会自动调用这个全局函数
// 这是一种"回调"模式——你告诉别人"准备好了叫我"
function onYouTubeIframeAPIReady() {
  // 先不创建播放器，等用户输入URL后再创建
  setStatus('ok', 'YouTube API 已就绪');
}

function createPlayer(videoId) {
  if (player) {
    player.loadVideoById(videoId);
    return;
  }

  document.getElementById('ytPlaceholder').style.display = 'none';

  player = new YT.Player('ytPlayer', {
    videoId: videoId,
    width: '100%',
    height: '100%',
    playerVars: {
      autoplay: 0,
      controls: 0,        // 隐藏YouTube自带控件，用我们自己的
      modestbranding: 1,
      rel: 0,
      fs: 0,
      iv_load_policy: 3,  // 隐藏注释
      cc_load_policy: 0,  // 不自动显示字幕（我们自己显示）
    },
    events: {
      onReady: onPlayerReady,
      onStateChange: onPlayerStateChange,
    }
  });
}

function onPlayerReady(event) {
  playerReady = true;
  const dur = player.getDuration();
  document.getElementById('totTime').textContent = fmtTime(dur);
  player.setVolume(document.getElementById('volSlider').value);
  
  // 获取视频信息
  const data = player.getVideoData();
  document.getElementById('pTitle').textContent = data.title || '未知标题';
  document.getElementById('pMeta').textContent = `YouTube · ${fmtTime(dur)}`;
  
  setStatus('ok', '视频已就绪 — 点击播放');
}

function onPlayerStateChange(event) {
  // YT.PlayerState: PLAYING=1, PAUSED=2, ENDED=0, BUFFERING=3
  if (event.data === YT.PlayerState.PLAYING) {
    playing = true;
    document.getElementById('playBtn').textContent = '⏸';
    tick();
  } else if (event.data === YT.PlayerState.PAUSED) {
    playing = false;
    document.getElementById('playBtn').textContent = '▶';
    cancelAnimationFrame(raf);
  } else if (event.data === YT.PlayerState.ENDED) {
    playing = false;
    document.getElementById('playBtn').textContent = '▶';
    cancelAnimationFrame(raf);
  }
}

// ================================================================
// 2. 解析 YouTube URL → 提取 Video ID
// ================================================================
// YouTube的URL有很多种格式，我们需要从中提取视频ID：
//   https://www.youtube.com/watch?v=dQw4w9WgXcQ   → dQw4w9WgXcQ
//   https://youtu.be/dQw4w9WgXcQ                   → dQw4w9WgXcQ
//   https://www.youtube.com/embed/dQw4w9WgXcQ       → dQw4w9WgXcQ
//
// 这里用到"正则表达式"(Regular Expression)——一种描述文本模式的语言
function extractVideoId(url) {
  // 这个正则的意思是：
  // (?:youtube\.com\/.*[?&]v=|youtu\.be\/|youtube\.com\/embed\/)
  //   → 匹配以上三种URL格式中视频ID之前的部分
  // ([a-zA-Z0-9_-]{11})
  //   → 捕获紧跟其后的11个字符（YouTube的ID固定11位）
  const patterns = [
    /(?:youtube\.com\/watch\?.*v=)([a-zA-Z0-9_-]{11})/,
    /(?:youtu\.be\/)([a-zA-Z0-9_-]{11})/,
    /(?:youtube\.com\/embed\/)([a-zA-Z0-9_-]{11})/,
    /(?:youtube\.com\/shorts\/)([a-zA-Z0-9_-]{11})/,
  ];
  
  for (const pat of patterns) {
    const match = url.match(pat);
    if (match) return match[1];
  }
  return null;
}

// ================================================================
// 3. 获取字幕
// ================================================================
async function fetchSubtitles(videoId) {
  setStatus('wait', '正在获取字幕...');
  
  try {
    // 尝试通过公开的代理服务获取YouTube字幕
    // 这些是社区维护的免费API
    const proxyUrls = [
      `https://yt-subtitle-api.vercel.app/api?id=${videoId}`,
      `https://deserving-harmony.surge.sh/api/transcript?videoId=${videoId}`,
    ];
    
    for (const apiUrl of proxyUrls) {
      try {
        const resp = await fetch(apiUrl, { signal: AbortSignal.timeout(5000) });
        if (resp.ok) {
          const data = await resp.json();
          if (data && data.length > 0) {
            subs = data.map(item => ({
              start: parseFloat(item.start || item.offset || 0),
              end: parseFloat(item.start || item.offset || 0) + parseFloat(item.dur || item.duration || 3),
              text: (item.text || item.content || '').replace(/<[^>]*>/g, '').replace(/&amp;/g, '&').replace(/&lt;/g, '<').replace(/&gt;/g, '>').replace(/&#39;/g, "'").replace(/&quot;/g, '"'),
            }));
            renderSubs();
            setStatus('ok', `已加载 ${subs.length} 条字幕`);
            return;
          }
        }
      } catch(e) { continue; }
    }
    
    // 如果自动获取失败，提示用户上传
    subs = [];
    renderSubs();
    setStatus('ok', '未找到自动字幕 — 你可以上传 SRT 文件');
    document.getElementById('helpText').textContent = '💡 该视频暂无自动字幕，试试上传SRT文件';
    document.getElementById('helpText').style.color = 'var(--gold)';
    
  } catch (err) {
    setStatus('err', '字幕获取失败');
  }
}

// ================================================================
// 4. 核心循环：时间同步 + 字幕查找
// ================================================================
function tick() {
  if (!player || !playing) return;
  
  const t = player.getCurrentTime();
  const dur = player.getDuration();
  
  // 更新进度条
  if (dur > 0) {
    document.getElementById('progressFill').style.width = (t / dur * 100) + '%';
    document.getElementById('curTime').textContent = fmtTime(t);
  }
  
  // 二分查找当前字幕
  // -------------------------------------------------------
  // 为什么用二分查找？
  // 假设有500条字幕，线性查找平均需要比较250次
  // 二分查找只需要 log2(500) ≈ 9 次
  // 每秒60帧，线性查找每秒做 250×60=15000 次比较
  // 二分查找只做 9×60=540 次——节省了96%的计算量
  // 在手机上这个差距会影响流畅度
  // -------------------------------------------------------
  if (subs.length > 0) {
    let newIdx = -1;
    let lo = 0, hi = subs.length - 1;
    
    while (lo <= hi) {
      const mid = (lo + hi) >> 1;  // >> 1 等价于 Math.floor(÷2)，但更快
      // 位运算(bit operation)直接操作二进制，
      // 右移1位就是除以2，CPU一个时钟周期就能完成
      
      if (subs[mid].start <= t) {
        if (subs[mid].end > t) {
          newIdx = mid;
          break;
        }
        lo = mid + 1;
      } else {
        hi = mid - 1;
      }
    }
    
    if (newIdx !== curSubIdx) {
      curSubIdx = newIdx;
      highlightSub();
    }
  }
  
  raf = requestAnimationFrame(tick);
}

// ================================================================
// 5. 字幕渲染 & 高亮
// ================================================================
function renderSubs() {
  const c = document.getElementById('subScroll');
  const empty = document.getElementById('emptyState');
  
  if (subs.length === 0) {
    empty.style.display = '';
    document.getElementById('subCount').textContent = '—';
    return;
  }
  
  empty.style.display = 'none';
  c.innerHTML = '';
  
  subs.forEach((s, i) => {
    const line = document.createElement('div');
    line.className = 's-line';
    line.dataset.i = i;
    line.innerHTML = `<span class="s-time">${fmtTime(s.start)}</span><span class="s-text">${s.text}</span>`;
    line.addEventListener('click', () => {
      if (player && playerReady) {
        player.seekTo(s.start, true);
        if (!playing) player.playVideo();
      }
    });
    c.appendChild(line);
  });
  
  document.getElementById('subCount').textContent = subs.length + ' lines';
}

function highlightSub() {
  const lines = document.querySelectorAll('.s-line');
  lines.forEach((el, i) => {
    el.classList.remove('active', 'past');
    if (i === curSubIdx) el.classList.add('active');
    else if (curSubIdx >= 0 && i < curSubIdx) el.classList.add('past');
  });
  
  if (curSubIdx >= 0 && lines[curSubIdx]) {
    const container = document.getElementById('subScroll');
    const el = lines[curSubIdx];
    container.scrollTop = el.offsetTop - container.clientHeight / 3;
  }
}

// ================================================================
// 6. 用户交互处理
// ================================================================
function handleParse() {
  const url = document.getElementById('urlInput').value.trim();
  if (!url) return;
  
  const vid = extractVideoId(url);
  if (!vid) {
    setStatus('err', '无法识别的YouTube链接');
    return;
  }
  
  setStatus('wait', '正在加载视频...');
  document.getElementById('parseBtn').disabled = true;
  
  // 如果YouTube API还没加载完，先记下来
  if (typeof YT === 'undefined' || !YT.Player) {
    pendingVideoId = vid;
    setStatus('wait', '正在加载YouTube API...');
    // 重写回调
    window.onYouTubeIframeAPIReady = function() {
      createPlayer(pendingVideoId);
      fetchSubtitles(pendingVideoId);
      document.getElementById('parseBtn').disabled = false;
    };
    return;
  }
  
  createPlayer(vid);
  fetchSubtitles(vid);
  document.getElementById('parseBtn').disabled = false;
}

// 回车键也能触发解析
document.getElementById('urlInput').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') handleParse();
});

function togglePlay() {
  if (!player || !playerReady) return;
  if (playing) {
    player.pauseVideo();
  } else {
    player.playVideo();
  }
}

function skip(sec) {
  if (!player || !playerReady) return;
  const t = player.getCurrentTime();
  player.seekTo(Math.max(0, t + sec), true);
}

function seekTo(e) {
  if (!player || !playerReady) return;
  const rect = e.currentTarget.getBoundingClientRect();
  const pct = (e.clientX - rect.left) / rect.width;
  player.seekTo(pct * player.getDuration(), true);
}

function setVol(v) {
  if (player && playerReady) player.setVolume(v);
}

function toggleMute() {
  if (!player || !playerReady) return;
  if (player.isMuted()) {
    player.unMute();
    document.querySelector('.vol-icon').textContent = '🔊';
  } else {
    player.mute();
    document.querySelector('.vol-icon').textContent = '🔇';
  }
}

function cycleSpeed() {
  spdIdx = (spdIdx + 1) % speeds.length;
  const s = speeds[spdIdx];
  if (player && playerReady) player.setPlaybackRate(s);
  document.getElementById('speedTag').textContent = s + '×';
}

function setMode(m) {
  mode = m;
  document.querySelectorAll('.mode-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.mode === m);
  });
  const container = document.getElementById('ytContainer');
  if (m === 'audio') {
    container.style.height = '0';
    container.style.paddingTop = '0';
    container.style.overflow = 'hidden';
    container.style.marginBottom = '0';
    container.style.border = 'none';
  } else {
    container.style.height = '';
    container.style.paddingTop = '56.25%';
    container.style.overflow = '';
    container.style.marginBottom = '';
    container.style.border = '';
  }
}

// ================================================================
// 7. SRT 文件上传解析
// ================================================================
function handleSrtUpload(input) {
  const file = input.files[0];
  if (!file) return;
  
  document.getElementById('srtUploadBtn').classList.add('loaded');
  document.getElementById('srtUploadBtn').querySelector('span:last-of-type').textContent = file.name;
  
  const reader = new FileReader();
  reader.onload = (e) => {
    subs = parseSRT(e.target.result);
    renderSubs();
    setStatus('ok', `字幕已加载 — ${subs.length} 行`);
  };
  reader.readAsText(file);
}

function parseSRT(text) {
  const result = [];
  const blocks = text.trim().replace(/\r\n/g, '\n').split(/\n\n+/);
  
  for (const block of blocks) {
    const lines = block.split('\n');
    for (let i = 0; i < lines.length; i++) {
      const m = lines[i].match(
        /(\d{1,2}):(\d{2}):(\d{2})[,.](\d{3})\s*-->\s*(\d{1,2}):(\d{2}):(\d{2})[,.](\d{3})/
      );
      if (m) {
        const start = +m[1]*3600 + +m[2]*60 + +m[3] + +m[4]/1000;
        const end   = +m[5]*3600 + +m[6]*60 + +m[7] + +m[8]/1000;
        const txt = lines.slice(i+1).filter(l => l.trim()).join(' ');
        if (txt) result.push({ start, end, text: txt });
      }
    }
  }
  return result;
}

// ================================================================
// Utils
// ================================================================
function fmtTime(s) {
  if (isNaN(s) || s < 0) return '0:00';
  const m = Math.floor(s / 60);
  const sec = Math.floor(s % 60);
  return m + ':' + (sec < 10 ? '0' : '') + sec;
}

function setStatus(state, text) {
  document.getElementById('stDot').className = 'st-dot ' + ({ok:'ok',wait:'wait',err:'err'}[state]||'');
  document.getElementById('stText').textContent = text;
}
</script>
