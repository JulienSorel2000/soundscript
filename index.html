<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SoundScript — 听见每一个字</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Instrument+Serif:ital@0;1&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}

:root{
  --bg:#080810;
  --bg2:#0e0e1a;
  --card:#141420;
  --card2:#1a1a2a;
  --border:#252538;
  --border2:#2e2e44;
  --accent:#e8b4b8;
  --accent2:#dba0a5;
  --accent-glow:#f0c8cc;
  --accent-dim:rgba(232,180,184,0.1);
  --teal:#7ec8c8;
  --teal-dim:rgba(126,200,200,0.1);
  --gold:#e8d4a0;
  --text:#d8d4e0;
  --text2:#9590a8;
  --text3:#5c586e;
  --sub-active:#fffbe6;
  --sub-past:#585468;
}

html{font-size:16px}

body{
  background:var(--bg);
  color:var(--text);
  font-family:'Noto Sans SC','Helvetica Neue',sans-serif;
  min-height:100vh;
  overflow-x:hidden;
}

/* Grain overlay */
body::after{
  content:'';position:fixed;inset:0;z-index:9999;pointer-events:none;
  opacity:0.03;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
}

/* Ambient glow */
.ambient{
  position:fixed;inset:0;z-index:0;pointer-events:none;
  background:
    radial-gradient(ellipse 600px 400px at 15% 15%, rgba(232,180,184,0.06) 0%, transparent 100%),
    radial-gradient(ellipse 500px 500px at 85% 75%, rgba(126,200,200,0.04) 0%, transparent 100%),
    radial-gradient(ellipse 800px 300px at 50% 100%, rgba(232,212,160,0.03) 0%, transparent 100%);
}

/* Header */
header{
  position:sticky;top:0;z-index:100;
  padding:20px 32px;
  display:flex;align-items:center;justify-content:space-between;
  border-bottom:1px solid var(--border);
  background:rgba(8,8,16,0.85);
  backdrop-filter:blur(24px);
}
.logo{display:flex;align-items:baseline;gap:10px}
.logo-mark{font-family:'Instrument Serif',serif;font-size:28px;font-style:italic;color:var(--accent);letter-spacing:-1px}
.logo-sub{font-family:'DM Mono',monospace;font-size:11px;color:var(--text3);letter-spacing:2px;text-transform:uppercase}
.gh-link{
  font-family:'DM Mono',monospace;font-size:12px;color:var(--text3);text-decoration:none;
  padding:6px 14px;border:1px solid var(--border);border-radius:6px;transition:all 0.3s;
}
.gh-link:hover{color:var(--accent);border-color:var(--accent-dim)}

/* Main */
main{
  position:relative;z-index:5;
  max-width:1320px;margin:0 auto;
  padding:28px 32px;
}
@media(max-width:768px){main{padding:20px 14px}header{padding:14px 16px}}

/* Input section */
.input-section{margin-bottom:28px}
.input-row{
  display:flex;gap:0;border:1px solid var(--border);border-radius:12px;
  background:var(--card);overflow:hidden;transition:border-color 0.4s,box-shadow 0.4s;
}
.input-row:focus-within{border-color:rgba(232,180,184,0.4);box-shadow:0 0 40px rgba(232,180,184,0.06)}
.input-tag{
  display:flex;align-items:center;padding:0 18px;
  font-family:'DM Mono',monospace;font-size:12px;color:var(--accent2);letter-spacing:1px;
  background:rgba(232,180,184,0.05);border-right:1px solid var(--border);white-space:nowrap;
}
#urlInput{
  flex:1;padding:18px 20px;background:transparent;border:none;outline:none;
  color:var(--text);font-family:'DM Mono',monospace;font-size:13px;
}
#urlInput::placeholder{color:var(--text3)}
.parse-btn{
  padding:18px 32px;border:none;
  background:linear-gradient(135deg,var(--accent2),var(--accent));
  color:var(--bg);font-family:'Noto Sans SC',sans-serif;
  font-size:14px;font-weight:700;cursor:pointer;transition:all 0.3s;letter-spacing:1px;
}
.parse-btn:hover{filter:brightness(1.1);padding-right:36px}
.parse-btn:active{transform:scale(0.97)}
.parse-btn:disabled{opacity:0.5;cursor:not-allowed}

.secondary-row{display:flex;gap:12px;margin-top:14px;align-items:center;flex-wrap:wrap}
.upload-btn{
  display:flex;align-items:center;gap:8px;padding:10px 18px;
  background:var(--card);border:1px dashed var(--border);border-radius:10px;
  color:var(--text2);font-size:13px;cursor:pointer;transition:all 0.3s;
}
.upload-btn:hover{border-color:var(--teal);color:var(--teal);background:var(--teal-dim)}
.upload-btn.loaded{border-color:var(--teal);border-style:solid;color:var(--teal);background:var(--teal-dim)}
.upload-btn input{display:none}
.help-text{margin-left:auto;font-family:'DM Mono',monospace;font-size:11px;color:var(--text3)}

/* Workspace */
.workspace{display:grid;grid-template-columns:1fr 400px;gap:20px;min-height:520px}
@media(max-width:900px){.workspace{grid-template-columns:1fr;gap:16px}}

/* Player card */
.player-card{
  background:var(--card);border:1px solid var(--border);border-radius:14px;
  display:flex;flex-direction:column;overflow:hidden;
}
.player-top-line{height:2px;background:linear-gradient(90deg,transparent,var(--accent),var(--teal),transparent)}
.player-inner{padding:28px 28px 24px;flex:1;display:flex;flex-direction:column}
.player-label{font-family:'DM Mono',monospace;font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:3px;margin-bottom:14px}

/* Cover + info */
.cover-row{display:flex;gap:20px;align-items:flex-start;margin-bottom:24px}
.cover-wrap{
  flex-shrink:0;width:100px;height:100px;border-radius:10px;overflow:hidden;
  background:var(--bg2);border:1px solid var(--border);
}
.cover-wrap img{width:100%;height:100%;object-fit:cover;display:block}
.cover-placeholder{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:32px;opacity:0.25}
.cover-info{flex:1;min-width:0}
.player-title{
  font-family:'Instrument Serif',serif;font-size:22px;font-style:italic;
  color:var(--text);line-height:1.3;margin-bottom:6px;
  overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;
}
.player-meta{font-family:'DM Mono',monospace;font-size:11px;color:var(--text3);margin-bottom:8px}

/* Background play badge */
.bg-badge{
  display:inline-flex;align-items:center;gap:5px;
  padding:3px 9px;border-radius:20px;
  background:var(--teal-dim);border:1px solid rgba(126,200,200,0.2);
  font-family:'DM Mono',monospace;font-size:10px;color:var(--teal);letter-spacing:0.5px;
}
.bg-badge::before{content:'';width:5px;height:5px;border-radius:50%;background:var(--teal);animation:blink 2s infinite}

/* Visualizer */
.viz-wrap{height:48px;margin-bottom:16px;display:flex;align-items:flex-end;gap:2px;overflow:hidden}
.viz-bar{flex:1;background:var(--border2);border-radius:2px 2px 0 0;min-height:2px;transition:height 0.1s ease}
.viz-bar.active{background:linear-gradient(180deg,var(--accent),var(--teal))}

/* Progress */
.progress-wrap{margin-bottom:16px}
.progress-track{
  width:100%;height:5px;background:var(--bg2);border-radius:3px;
  cursor:pointer;position:relative;transition:height 0.2s;
}
.progress-track:hover{height:8px}
.progress-fill{
  height:100%;border-radius:3px;pointer-events:none;position:relative;
  background:linear-gradient(90deg,var(--accent),var(--teal));width:0%;
}
.progress-fill::after{
  content:'';position:absolute;right:-5px;top:50%;transform:translateY(-50%);
  width:12px;height:12px;background:var(--accent-glow);border-radius:50%;
  box-shadow:0 0 10px rgba(232,180,184,0.5);opacity:0;transition:opacity 0.2s;
}
.progress-track:hover .progress-fill::after{opacity:1}
.time-stamps{display:flex;justify-content:space-between;margin-top:6px;font-family:'DM Mono',monospace;font-size:11px;color:var(--text3)}

/* Controls */
.controls{display:flex;align-items:center;justify-content:center;gap:16px;margin-bottom:20px}
.c-btn{
  width:40px;height:40px;border-radius:50%;background:transparent;border:1px solid var(--border);
  color:var(--text2);font-size:14px;cursor:pointer;transition:all 0.25s;
  display:flex;align-items:center;justify-content:center;
}
.c-btn:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-dim)}
.c-btn.play{
  width:56px;height:56px;font-size:20px;
  background:linear-gradient(135deg,var(--accent2),var(--accent));border:none;color:var(--bg);
  box-shadow:0 4px 24px rgba(232,180,184,0.25);
}
.c-btn.play:hover{transform:scale(1.08);box-shadow:0 6px 32px rgba(232,180,184,0.4)}

/* Player bottom */
.player-bottom{
  display:flex;align-items:center;gap:12px;padding:14px 28px;
  background:var(--bg2);border-top:1px solid var(--border);
}
.vol-icon{cursor:pointer;font-size:16px;color:var(--text3);transition:color 0.2s;user-select:none}
.vol-icon:hover{color:var(--text)}
.vol-slider{width:90px;-webkit-appearance:none;height:3px;background:var(--border);border-radius:2px;outline:none;cursor:pointer}
.vol-slider::-webkit-slider-thumb{-webkit-appearance:none;width:12px;height:12px;background:var(--accent);border-radius:50%;cursor:pointer}
.speed-tag{
  margin-left:auto;padding:4px 10px;background:var(--card2);border:1px solid var(--border);
  border-radius:5px;font-family:'DM Mono',monospace;font-size:11px;color:var(--text3);
  cursor:pointer;transition:all 0.2s;user-select:none;
}
.speed-tag:hover{border-color:var(--accent);color:var(--accent)}

/* Subtitle panel */
.sub-panel{background:var(--card);border:1px solid var(--border);border-radius:14px;display:flex;flex-direction:column;overflow:hidden}
.sub-head{padding:18px 22px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.sub-head-title{font-family:'Instrument Serif',serif;font-size:18px;font-style:italic;color:var(--text)}
.sub-count{font-family:'DM Mono',monospace;font-size:11px;padding:3px 10px;border-radius:20px;background:var(--accent-dim);color:var(--accent2)}
.sub-scroll{flex:1;overflow-y:auto;padding:10px 0;scroll-behavior:smooth;max-height:460px}
.sub-scroll::-webkit-scrollbar{width:3px}
.sub-scroll::-webkit-scrollbar-track{background:transparent}
.sub-scroll::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
.s-line{padding:11px 22px;display:flex;gap:14px;cursor:pointer;transition:all 0.3s;border-left:2px solid transparent}
.s-line:hover{background:rgba(255,255,255,0.02)}
.s-line.active{background:var(--accent-dim);border-left-color:var(--accent)}
.s-line.active .s-text{color:var(--sub-active);font-weight:500}
.s-line.active .s-time{color:var(--accent)}
.s-line.past .s-text{color:var(--sub-past)}
.s-time{font-family:'DM Mono',monospace;font-size:11px;color:var(--text3);min-width:48px;padding-top:3px;flex-shrink:0}
.s-text{font-size:14px;line-height:1.65;color:var(--text2);transition:color 0.3s}

.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 30px;text-align:center;height:100%}
.empty-icon{font-size:36px;margin-bottom:14px;opacity:0.3}
.empty-t{font-family:'Instrument Serif',serif;font-size:18px;font-style:italic;margin-bottom:8px;color:var(--text2)}
.empty-d{font-size:12px;color:var(--text3);line-height:1.7;max-width:240px}

/* Status */
.status{
  margin-top:16px;padding:10px 18px;background:var(--card);border:1px solid var(--border);
  border-radius:8px;display:flex;align-items:center;gap:10px;
}
.st-dot{width:6px;height:6px;border-radius:50%;background:var(--text3)}
.st-dot.ok{background:var(--teal);box-shadow:0 0 8px rgba(126,200,200,0.4)}
.st-dot.wait{background:var(--gold);animation:blink 1.2s infinite}
.st-dot.err{background:#e87474}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.3}}
.st-text{font-family:'DM Mono',monospace;font-size:11px;color:var(--text3)}

/* Retry button */
.retry-btn{
  margin-left:auto;padding:4px 12px;
  background:transparent;border:1px solid #e87474;border-radius:5px;
  color:#e87474;font-family:'DM Mono',monospace;font-size:11px;
  cursor:pointer;transition:all 0.2s;display:none;
}
.retry-btn:hover{background:rgba(232,116,116,0.1)}
.retry-btn.show{display:inline-block}

/* API server row */
.api-row{
  display:flex;gap:0;margin-top:10px;border:1px solid var(--border);border-radius:10px;
  background:var(--card2);overflow:hidden;transition:all 0.3s;
}
.api-tag{
  display:flex;align-items:center;padding:0 14px;
  font-family:'DM Mono',monospace;font-size:11px;color:var(--text3);letter-spacing:1px;
  background:rgba(126,200,200,0.04);border-right:1px solid var(--border);white-space:nowrap;
}
#apiInput{
  flex:1;padding:11px 16px;background:transparent;border:none;outline:none;
  color:var(--text2);font-family:'DM Mono',monospace;font-size:12px;
}
#apiInput::placeholder{color:var(--text3)}
.api-save-btn{
  padding:10px 18px;border:none;background:transparent;
  color:var(--teal);font-family:'DM Mono',monospace;font-size:11px;
  cursor:pointer;transition:all 0.2s;border-left:1px solid var(--border);letter-spacing:1px;
}
.api-save-btn:hover{background:var(--teal-dim)}
.api-indicator{
  display:flex;align-items:center;gap:6px;padding:0 14px;
  font-family:'DM Mono',monospace;font-size:11px;color:var(--text3);
}
.api-dot{width:5px;height:5px;border-radius:50%;background:var(--text3)}
.api-dot.set{background:var(--teal);box-shadow:0 0 6px rgba(126,200,200,0.5)}

/* Animations */
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.input-section{animation:fadeUp 0.6s ease-out}
.workspace{animation:fadeUp 0.6s ease-out 0.15s both}
.status{animation:fadeUp 0.6s ease-out 0.3s both}
</style>
</head>
<body>

<div class="ambient"></div>

<header>
  <div class="logo">
    <span class="logo-mark">SoundScript</span>
    <span class="logo-sub">listen · read · learn</span>
  </div>
  <a class="gh-link" href="https://github.com/JulienSorel2000/soundscript" target="_blank">GitHub ↗</a>
</header>

<main>
  <div class="input-section">
    <div class="input-row">
      <div class="input-tag">YOUTUBE</div>
      <input id="urlInput" type="text" placeholder="粘贴 YouTube 视频链接，按回车或点击解析...">
      <button class="parse-btn" id="parseBtn" onclick="handleParse()">解 析</button>
    </div>
    <div class="secondary-row">
      <label class="upload-btn" id="audioUploadBtn">
        <span>🎵</span><span id="audioUploadLabel">上传本地音频</span>
        <input type="file" accept="audio/*" onchange="handleAudioUpload(this)">
      </label>
      <label class="upload-btn" id="srtUploadBtn">
        <span>📄</span><span id="srtUploadLabel">上传 SRT 字幕</span>
        <input type="file" accept=".srt,.vtt,.txt" onchange="handleSrtUpload(this)">
      </label>
      <span class="upload-btn" style="cursor:pointer" onclick="toggleApiRow()">⚙️ 服务器</span>
      <span class="help-text" id="helpText">多源容错 · 后台播放</span>
    </div>
    <div class="api-row" id="apiRow" style="display:none">
      <div class="api-tag">API</div>
      <input id="apiInput" type="text" placeholder="https://xxxx.trycloudflare.com（留空则使用多源容错模式）">
      <button class="api-save-btn" onclick="saveApiBase()">保 存</button>
      <div class="api-indicator"><div class="api-dot" id="apiDot"></div><span id="apiStatus">未设置</span></div>
    </div>
  </div>

  <div class="workspace">
    <!-- Player -->
    <div class="player-card">
      <div class="player-top-line"></div>
      <div class="player-inner">
        <div class="player-label">now playing</div>

        <div class="cover-row">
          <div class="cover-wrap">
            <div class="cover-placeholder" id="coverPlaceholder">◉</div>
            <img id="coverImg" src="" alt="" style="display:none">
          </div>
          <div class="cover-info">
            <div class="player-title" id="pTitle">等待加载...</div>
            <div class="player-meta" id="pMeta">输入 YouTube 链接开始</div>
            <span class="bg-badge">后台播放</span>
          </div>
        </div>

        <!-- Visualizer -->
        <div class="viz-wrap" id="vizWrap"></div>

        <!-- Progress -->
        <div class="progress-wrap">
          <div class="progress-track" id="progressTrack">
            <div class="progress-fill" id="progressFill"></div>
          </div>
          <div class="time-stamps">
            <span id="curTime">0:00</span>
            <span id="totTime">0:00</span>
          </div>
        </div>

        <!-- Controls -->
        <div class="controls">
          <button class="c-btn" onclick="skip(-10)" title="-10s">⏪</button>
          <button class="c-btn play" id="playBtn" onclick="togglePlay()">▶</button>
          <button class="c-btn" onclick="skip(10)" title="+10s">⏩</button>
        </div>
      </div>

      <div class="player-bottom">
        <span class="vol-icon" id="volIcon" onclick="toggleMute()">🔊</span>
        <input type="range" class="vol-slider" id="volSlider" min="0" max="100" value="80" oninput="setVol(this.value)">
        <span class="speed-tag" id="speedTag" onclick="cycleSpeed()">1.0×</span>
      </div>
    </div>

    <!-- Subtitles -->
    <div class="sub-panel">
      <div class="sub-head">
        <span class="sub-head-title">Transcript</span>
        <span class="sub-count" id="subCount">—</span>
      </div>
      <div class="sub-scroll" id="subScroll">
        <div class="empty" id="emptyState">
          <div class="empty-icon">💬</div>
          <div class="empty-t">暂无字幕</div>
          <div class="empty-d">解析视频后字幕将在此同步滚动，也可上传 SRT 文件</div>
        </div>
      </div>
    </div>
  </div>

  <div class="status">
    <div class="st-dot" id="stDot"></div>
    <span class="st-text" id="stText">就绪</span>
    <button class="retry-btn" id="retryBtn" onclick="handleRetry()">重试</button>
  </div>
</main>

<audio id="audioEl" preload="none"></audio>

<script>
// ================================================================
// 服务器配置 — 支持 ?api= URL 参数或界面输入
// ================================================================
let API_BASE = '';

(function initApiBase() {
  // 1. 从 URL 参数读取
  const params = new URLSearchParams(window.location.search);
  const fromUrl = params.get('api');
  if (fromUrl) {
    API_BASE = fromUrl.replace(/\/$/, '');
  }
  // 更新 UI
  updateApiUI();
})();

function updateApiUI() {
  const dot = document.getElementById('apiDot');
  const status = document.getElementById('apiStatus');
  const input = document.getElementById('apiInput');
  if (API_BASE) {
    dot.className = 'api-dot set';
    // Show only the host part
    try { status.textContent = new URL(API_BASE).host; } catch(e) { status.textContent = API_BASE; }
    input.value = API_BASE;
    document.getElementById('helpText').textContent = '本地后端 · 后台播放';
  } else {
    dot.className = 'api-dot';
    status.textContent = '未设置';
    document.getElementById('helpText').textContent = '多源容错 · 后台播放';
  }
}

function toggleApiRow() {
  const row = document.getElementById('apiRow');
  row.style.display = row.style.display === 'none' ? 'flex' : 'none';
}

function saveApiBase() {
  const val = document.getElementById('apiInput').value.trim().replace(/\/$/, '');
  API_BASE = val;
  updateApiUI();
  if (val) {
    setStatus('ok', `已设置后端: ${val}`);
  } else {
    setStatus('', '已清除后端地址，将使用多源容错模式');
  }
}

// ================================================================
// 多源配置
// ================================================================
const SOURCES = {
  cobalt: {
    name: 'Cobalt',
    async getAudio(videoId) {
      const resp = await fetch('https://api.cobalt.tools/', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Accept': 'application/json',
        },
        body: JSON.stringify({
          url: `https://www.youtube.com/watch?v=${videoId}`,
          audioFormat: 'mp3',
          isAudioOnly: true,
        }),
        signal: AbortSignal.timeout(8000),
      });
      if (!resp.ok) throw new Error(`cobalt: HTTP ${resp.status}`);
      const data = await resp.json();
      if (data.url) return { audioUrl: data.url, title: null, uploader: null, thumbnailUrl: null, duration: null, subtitles: [] };
      throw new Error('cobalt: no url in response');
    }
  },

  piped: {
    name: 'Piped',
    instances: [
      'https://pipedapi.kavin.rocks',
      'https://pipedapi.adminforge.de',
      'https://pipedapi.leptons.xyz',
      'https://piped-api.privacy.com.de',
    ],
    async getAudio(videoId) {
      for (const inst of this.instances) {
        try {
          const resp = await fetch(`${inst}/streams/${videoId}`, { signal: AbortSignal.timeout(8000) });
          if (!resp.ok) continue;
          const data = await resp.json();
          if (!data.audioStreams?.length) continue;
          const best = data.audioStreams
            .filter(s => s.mimeType?.startsWith('audio/') || s.url)
            .sort((a, b) => (b.bitrate || 0) - (a.bitrate || 0))[0];
          if (!best?.url) continue;
          return {
            audioUrl: best.url,
            title: data.title || null,
            uploader: data.uploader || null,
            thumbnailUrl: data.thumbnailUrl || null,
            duration: data.duration || null,
            subtitles: data.subtitles || [],
            quality: best.quality || '',
          };
        } catch(e) { /* try next */ }
      }
      throw new Error('piped: all instances failed');
    }
  },

  invidious: {
    name: 'Invidious',
    instances: [
      'https://inv.nadeko.net',
      'https://yewtu.be',
      'https://invidious.nerdvpn.de',
    ],
    async getAudio(videoId) {
      for (const inst of this.instances) {
        try {
          const resp = await fetch(`${inst}/api/v1/videos/${videoId}`, { signal: AbortSignal.timeout(8000) });
          if (!resp.ok) continue;
          const data = await resp.json();
          const audioFormats = (data.adaptiveFormats || [])
            .filter(f => f.type?.startsWith('audio/'))
            .sort((a, b) => (b.bitrate || 0) - (a.bitrate || 0));
          if (!audioFormats[0]?.url) continue;
          // Map captions to subtitle-like objects
          const subtitles = (data.captions || []).map(c => ({
            url: `${inst}${c.url}`,
            code: c.languageCode || c.label || '',
          }));
          return {
            audioUrl: audioFormats[0].url,
            title: data.title || null,
            uploader: data.author || null,
            thumbnailUrl: (data.videoThumbnails || []).find(t => t.quality === 'maxres')?.url
              || (data.videoThumbnails || [])[0]?.url || null,
            duration: data.lengthSeconds || null,
            subtitles,
          };
        } catch(e) { /* try next */ }
      }
      throw new Error('invidious: all instances failed');
    }
  }
};

const SOURCE_ORDER = ['cobalt', 'piped', 'invidious'];

// ================================================================
// 状态
// ================================================================
const audio = document.getElementById('audioEl');
let subs = [];
let playing = false;
let curSubIdx = -1;
let raf = null;
let speeds = [0.5, 0.75, 1.0, 1.25, 1.5, 2.0];
let spdIdx = 2;
let isMuted = false;
let currentTitle = '';
let currentArtist = '';
let currentThumbnail = '';
let lastVideoId = null;

// Visualizer
let vizBars = [];
let vizRaf = null;
(function initViz() {
  const wrap = document.getElementById('vizWrap');
  for (let i = 0; i < 40; i++) {
    const bar = document.createElement('div');
    bar.className = 'viz-bar';
    bar.style.height = '4px';
    wrap.appendChild(bar);
    vizBars.push(bar);
  }
})();

function animateViz() {
  vizBars.forEach(bar => {
    const h = Math.random() * 42 + 2;
    bar.style.height = h + 'px';
    bar.classList.add('active');
  });
  vizRaf = requestAnimationFrame(animateViz);
}

function stopViz() {
  cancelAnimationFrame(vizRaf);
  vizBars.forEach(bar => { bar.style.height = '4px'; bar.classList.remove('active'); });
}

// ================================================================
// 进度条拖拽
// ================================================================
const progressTrack = document.getElementById('progressTrack');
let dragging = false;

function seekByEvent(e) {
  const rect = progressTrack.getBoundingClientRect();
  const x = (e.touches ? e.touches[0].clientX : e.clientX) - rect.left;
  const pct = Math.max(0, Math.min(1, x / rect.width));
  if (!isNaN(audio.duration)) audio.currentTime = pct * audio.duration;
}

progressTrack.addEventListener('mousedown', (e) => { dragging = true; seekByEvent(e); });
progressTrack.addEventListener('touchstart', (e) => { dragging = true; seekByEvent(e); }, {passive:true});
window.addEventListener('mousemove', (e) => { if (dragging) seekByEvent(e); });
window.addEventListener('touchmove', (e) => { if (dragging) seekByEvent(e); }, {passive:true});
window.addEventListener('mouseup', () => { dragging = false; });
window.addEventListener('touchend', () => { dragging = false; });

// ================================================================
// 提取 YouTube Video ID
// ================================================================
function extractVideoId(url) {
  const patterns = [
    /(?:youtube\.com\/watch\?.*v=)([a-zA-Z0-9_-]{11})/,
    /(?:youtu\.be\/)([a-zA-Z0-9_-]{11})/,
    /(?:youtube\.com\/embed\/)([a-zA-Z0-9_-]{11})/,
    /(?:youtube\.com\/shorts\/)([a-zA-Z0-9_-]{11})/,
  ];
  for (const pat of patterns) {
    const m = url.match(pat);
    if (m) return m[1];
  }
  return null;
}

// ================================================================
// 多源音频解析 — 依次尝试
// ================================================================
async function resolveAudio(videoId) {
  for (const name of SOURCE_ORDER) {
    try {
      setStatus('wait', `正在尝试 ${SOURCES[name].name}...`);
      const result = await SOURCES[name].getAudio(videoId);
      return { ...result, sourceName: SOURCES[name].name };
    } catch(e) {
      // 继续下一个来源
    }
  }
  throw new Error('所有来源均不可用，请稍后重试');
}

// ================================================================
// 本地后端解析
// ================================================================
async function resolveFromBackend(url) {
  setStatus('wait', '正在通过本地后端提取...');
  const resp = await fetch(`${API_BASE}/api/extract`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ url }),
    signal: AbortSignal.timeout(15000),
  });
  if (!resp.ok) throw new Error(`后端响应 ${resp.status}`);
  const data = await resp.json();
  if (!data.success) throw new Error(data.error || '后端返回失败');
  return {
    audioUrl: data.audio_url,
    title: data.title,
    uploader: data.uploader,
    thumbnailUrl: data.thumbnail,
    duration: data.duration,
    subtitles: [],
    sourceName: '本地后端',
  };
}

async function fetchSubtitlesFromBackend(url) {
  try {
    const resp = await fetch(`${API_BASE}/api/subtitles`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ url }),
      signal: AbortSignal.timeout(20000),
    });
    if (!resp.ok) return [];
    const data = await resp.json();
    if (!data.success || !data.subtitles?.length) return [];
    return data.subtitles; // already [{start, end, text}]
  } catch(e) {
    return [];
  }
}

// ================================================================
// 解析入口
// ================================================================
async function handleParse() {
  const url = document.getElementById('urlInput').value.trim();
  if (!url) return;

  const vid = extractVideoId(url);
  if (!vid) { setStatus('err', '无法识别的 YouTube 链接'); showRetry(false); return; }

  lastVideoId = vid;
  const btn = document.getElementById('parseBtn');
  btn.disabled = true;
  showRetry(false);

  try {
    let data;

    if (API_BASE) {
      // 优先使用本地后端
      data = await resolveFromBackend(url);
    } else {
      // 多源容错模式
      data = await resolveAudio(vid);
    }

    // 加载音频
    currentTitle  = data.title || '未知标题';
    currentArtist = data.uploader || 'YouTube';
    currentThumbnail = data.thumbnailUrl || '';

    document.getElementById('pTitle').textContent = currentTitle;
    document.getElementById('pMeta').textContent = `${currentArtist} · ${fmtTime(data.duration || 0)}`;
    document.getElementById('totTime').textContent = fmtTime(data.duration || 0);

    if (currentThumbnail) {
      const img = document.getElementById('coverImg');
      img.src = currentThumbnail;
      img.style.display = 'block';
      document.getElementById('coverPlaceholder').style.display = 'none';
    }

    // 设置 src（不设 crossOrigin，避免 CORS 拦截）
    audio.src = data.audioUrl;
    audio.volume = document.getElementById('volSlider').value / 100;
    audio.playbackRate = speeds[spdIdx];
    audio.load();

    updateMediaSession();
    const qualityNote = data.quality ? ` · ${data.quality}` : '';
    setStatus('ok', `已就绪 via ${data.sourceName}${qualityNote} · 支持后台播放`);

    // 获取字幕
    if (API_BASE) {
      const parsed = await fetchSubtitlesFromBackend(url);
      if (parsed.length) {
        subs = parsed;
        curSubIdx = -1;
        renderSubs();
      }
    } else if (data.subtitles?.length) {
      await loadSubtitles(data.subtitles);
    }

  } catch(err) {
    setStatus('err', err.message);
    showRetry(true);
  } finally {
    btn.disabled = false;
  }
}

function handleRetry() {
  if (lastVideoId) {
    document.getElementById('urlInput').value = `https://www.youtube.com/watch?v=${lastVideoId}`;
    handleParse();
  }
}

function showRetry(show) {
  document.getElementById('retryBtn').classList.toggle('show', show);
}

// ================================================================
// 字幕：选语言 → fetch VTT → 解析
// ================================================================
async function loadSubtitles(subtitleList) {
  if (!subtitleList.length) return;

  // 优先级：zh > en > ja > 第一个
  const PREF = ['zh', 'en', 'ja'];
  let chosen = null;
  for (const lang of PREF) {
    chosen = subtitleList.find(s => s.code && s.code.startsWith(lang));
    if (chosen) break;
  }
  if (!chosen) chosen = subtitleList[0];

  try {
    const resp = await fetch(chosen.url, {signal: AbortSignal.timeout(8000)});
    if (!resp.ok) return;
    const text = await resp.text();
    subs = parseVTT(text);
    curSubIdx = -1;
    renderSubs();
  } catch(e) {
    // 字幕获取失败不影响播放
  }
}

// ================================================================
// Audio events
// ================================================================
audio.addEventListener('loadedmetadata', () => {
  document.getElementById('totTime').textContent = fmtTime(audio.duration);
});

audio.addEventListener('play', () => {
  playing = true;
  document.getElementById('playBtn').textContent = '⏸';
  animateViz();
  tick();
  updateMediaSession();
});

audio.addEventListener('pause', () => {
  playing = false;
  document.getElementById('playBtn').textContent = '▶';
  cancelAnimationFrame(raf);
  stopViz();
});

audio.addEventListener('ended', () => {
  playing = false;
  document.getElementById('playBtn').textContent = '▶';
  cancelAnimationFrame(raf);
  stopViz();
});

audio.addEventListener('error', () => {
  setStatus('err', '音频流加载失败（直链可能已过期，请重新解析）');
  showRetry(true);
});

// ================================================================
// 主循环：进度 + 字幕同步
// ================================================================
function tick() {
  if (!playing) return;
  const t = audio.currentTime;
  const dur = audio.duration || 0;

  if (dur > 0 && !dragging) {
    document.getElementById('progressFill').style.width = (t / dur * 100) + '%';
    document.getElementById('curTime').textContent = fmtTime(t);
  }

  if (subs.length > 0) {
    let newIdx = -1;
    let lo = 0, hi = subs.length - 1;
    while (lo <= hi) {
      const mid = (lo + hi) >> 1;
      if (subs[mid].start <= t) {
        if (subs[mid].end > t) { newIdx = mid; break; }
        lo = mid + 1;
      } else {
        hi = mid - 1;
      }
    }
    if (newIdx !== curSubIdx) { curSubIdx = newIdx; highlightSub(); }
  }

  raf = requestAnimationFrame(tick);
}

// ================================================================
// 字幕渲染 & 高亮
// ================================================================
function renderSubs() {
  const c = document.getElementById('subScroll');
  document.getElementById('emptyState').style.display = 'none';
  c.innerHTML = '';

  subs.forEach((s, i) => {
    const line = document.createElement('div');
    line.className = 's-line';
    line.dataset.i = i;
    line.innerHTML = `<span class="s-time">${fmtTime(s.start)}</span><span class="s-text">${escHtml(s.text)}</span>`;
    line.addEventListener('click', () => {
      audio.currentTime = s.start;
      if (audio.paused) audio.play();
    });
    c.appendChild(line);
  });

  document.getElementById('subCount').textContent = subs.length + ' lines';
}

function highlightSub() {
  const lines = document.querySelectorAll('.s-line');
  lines.forEach((el, i) => {
    el.classList.remove('active', 'past');
    if (i === curSubIdx) el.classList.add('active');
    else if (curSubIdx >= 0 && i < curSubIdx) el.classList.add('past');
  });
  if (curSubIdx >= 0 && lines[curSubIdx]) {
    const c = document.getElementById('subScroll');
    c.scrollTop = lines[curSubIdx].offsetTop - c.clientHeight / 3;
  }
}

// ================================================================
// MediaSession API
// ================================================================
function updateMediaSession() {
  if (!('mediaSession' in navigator)) return;
  navigator.mediaSession.metadata = new MediaMetadata({
    title: currentTitle,
    artist: currentArtist,
    album: 'SoundScript',
    artwork: currentThumbnail ? [{src: currentThumbnail, sizes: '512x512', type: 'image/jpeg'}] : [],
  });
  navigator.mediaSession.setActionHandler('play',         () => audio.play());
  navigator.mediaSession.setActionHandler('pause',        () => audio.pause());
  navigator.mediaSession.setActionHandler('seekbackward', () => { audio.currentTime = Math.max(0, audio.currentTime - 10); });
  navigator.mediaSession.setActionHandler('seekforward',  () => { audio.currentTime = Math.min(audio.duration || 0, audio.currentTime + 10); });
  navigator.mediaSession.setActionHandler('seekto',       (d) => { if (d.seekTime != null) audio.currentTime = d.seekTime; });
}

// ================================================================
// 控制
// ================================================================
function togglePlay() {
  if (!audio.src) return;
  audio.paused ? audio.play().catch(e => setStatus('err', '播放失败: ' + e.message)) : audio.pause();
}

function skip(sec) {
  if (!audio.src) return;
  audio.currentTime = Math.max(0, Math.min(audio.duration || 0, audio.currentTime + sec));
}

function setVol(v) {
  audio.volume = v / 100;
  isMuted = v == 0;
  document.getElementById('volIcon').textContent = isMuted ? '🔇' : '🔊';
}

function toggleMute() {
  audio.muted = !audio.muted;
  isMuted = audio.muted;
  document.getElementById('volIcon').textContent = isMuted ? '🔇' : '🔊';
}

function cycleSpeed() {
  spdIdx = (spdIdx + 1) % speeds.length;
  audio.playbackRate = speeds[spdIdx];
  document.getElementById('speedTag').textContent = speeds[spdIdx] + '×';
}

// ================================================================
// 本地文件上传
// ================================================================
function handleAudioUpload(input) {
  const file = input.files[0];
  if (!file) return;
  document.getElementById('audioUploadBtn').classList.add('loaded');
  document.getElementById('audioUploadLabel').textContent = file.name.slice(0, 20);
  currentTitle  = file.name.replace(/\.[^.]+$/, '');
  currentArtist = '本地文件';
  currentThumbnail = '';
  document.getElementById('pTitle').textContent = currentTitle;
  document.getElementById('pMeta').textContent = '本地音频文件';
  document.getElementById('coverImg').style.display = 'none';
  document.getElementById('coverPlaceholder').style.display = 'flex';
  audio.src = URL.createObjectURL(file);
  audio.load();
  updateMediaSession();
  setStatus('ok', '本地音频已加载 — 点击播放');
}

function handleSrtUpload(input) {
  const file = input.files[0];
  if (!file) return;
  document.getElementById('srtUploadBtn').classList.add('loaded');
  document.getElementById('srtUploadLabel').textContent = file.name.slice(0, 20);
  const reader = new FileReader();
  reader.onload = (e) => {
    subs = file.name.endsWith('.vtt') ? parseVTT(e.target.result) : parseSRT(e.target.result);
    curSubIdx = -1;
    renderSubs();
    setStatus('ok', `字幕已加载 — ${subs.length} 行`);
  };
  reader.readAsText(file);
}

// ================================================================
// 字幕解析器
// ================================================================
function parseSRT(text) {
  const result = [];
  const blocks = text.trim().replace(/\r\n/g, '\n').split(/\n\n+/);
  for (const block of blocks) {
    const lines = block.split('\n');
    for (let i = 0; i < lines.length; i++) {
      const m = lines[i].match(/(\d{1,2}):(\d{2}):(\d{2})[,.](\d{3})\s*-->\s*(\d{1,2}):(\d{2}):(\d{2})[,.](\d{3})/);
      if (m) {
        const start = +m[1]*3600 + +m[2]*60 + +m[3] + +m[4]/1000;
        const end   = +m[5]*3600 + +m[6]*60 + +m[7] + +m[8]/1000;
        const txt = lines.slice(i+1).filter(l => l.trim()).join(' ').replace(/<[^>]+>/g, '').trim();
        if (txt) result.push({start, end, text: txt});
        break;
      }
    }
  }
  return result;
}

function parseVTT(text) {
  const result = [];
  const blocks = text.replace(/\r\n/g, '\n').split(/\n\n+/);
  for (const block of blocks) {
    const lines = block.split('\n');
    for (let i = 0; i < lines.length; i++) {
      const m = lines[i].match(/(\d{1,2}):(\d{2}):(\d{2})[.,](\d{3})\s*-->\s*(\d{1,2}):(\d{2}):(\d{2})[.,](\d{3})/);
      if (m) {
        const start = +m[1]*3600 + +m[2]*60 + +m[3] + +m[4]/1000;
        const end   = +m[5]*3600 + +m[6]*60 + +m[7] + +m[8]/1000;
        const txt = lines.slice(i+1)
          .filter(l => l.trim() && !l.startsWith('NOTE') && !l.startsWith('STYLE') && !l.startsWith('REGION'))
          .join(' ')
          .replace(/<[^>]+>/g, '')
          .replace(/&amp;/g,'&').replace(/&lt;/g,'<').replace(/&gt;/g,'>').replace(/&#39;/g,"'")
          .trim();
        if (txt) result.push({start, end, text: txt});
        break;
      }
    }
  }
  return result;
}

// ================================================================
// Utils
// ================================================================
function fmtTime(s) {
  if (isNaN(s) || s < 0) return '0:00';
  const m = Math.floor(s / 60), sec = Math.floor(s % 60);
  return m + ':' + (sec < 10 ? '0' : '') + sec;
}

function setStatus(state, text) {
  document.getElementById('stDot').className = 'st-dot ' + ({'ok':'ok','wait':'wait','err':'err'}[state]||'');
  document.getElementById('stText').textContent = text;
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

document.getElementById('urlInput').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') handleParse();
});
</script>
